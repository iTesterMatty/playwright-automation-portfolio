name: Playwright End-to-End Tests

# 1. Trigger the workflow on every push or pull request to the main branch
on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    test:
        # 2. Run the tests on a fresh clound instance of Ubuntu Linux
        runs-on: ubuntu-latest

        steps:
        # 3. Check out the code from a repository into the cloud machine
        - name: Checkout repository
          uses: actions/checkout@v4

        # 4. Set up secure Python environment
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'
        
        # 5. Setup all dependencies, including python-dotenv and pytest-html
        - name: Install Dependencies
          run: |
           python -m pip install --upgrade pip
           pip install playwright pytest pytest-html python-dotenv
        
        # 6. Install the system browsers required by Playwright (Firefox, Chromium, Webkkit)
        - name: Install Playwright Browsers
          run: playwright install --with-deps
        
        # 7. Execute the test suite completely headless in the cloud
        - name: Run Pytest Automation Suite
          # Inject the environmental variables dynamically from Github's secret vault
          env:
            SAUCE_USER: ${{secrets.SAUCE_USER}}
            SAUCE_PASSWORD: ${{secrets.SAUCE_PASSWORD}}
          run: |
            pwd
            ls -R
            python -m pytest